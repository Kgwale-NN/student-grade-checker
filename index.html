<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Grade Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Student Grade Checker</h1>

  <div id="form-section">
    <label for="studentName">Student Name:</label>
    <input type="text" id="studentName" placeholder="Enter name" />

    <label for="studentMark">Mark (0–100):</label>
    <input type="number" id="studentMark" placeholder="Enter mark" min="0" max="100" />

    <button onclick="checkGrade()">Submit</button>
  </div>

  <div id="result"></div>

  <h2>Submitted Students</h2>
  <ul id="studentList"></ul>

  <script src="script.js"></script>
</body>
</html>
